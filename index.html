<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Calculator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

html, body {
  margin: 0; padding: 0;
  height: 100%;
  font-family: 'Roboto Mono', monospace;
  background: #121212;
  color: #e0e0e0;
  overflow-x: hidden;
  cursor: crosshair;
}

/* Parallax layers */
.parallax-layer {
  position: fixed;
  top: 0; left: 0;
  width: 200%; height: 200%;
  background: radial-gradient(circle at center, #1f1f1f, #121212);
  opacity: 0.2;
  z-index: -1;
  transform: translate(0,0);
  transition: transform 0.05s linear;
}

.parallax-layer.layer1 { transform: scale(1); }
.parallax-layer.layer2 { transform: scale(1.05); }
.parallax-layer.layer3 { transform: scale(1.1); }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
  display: flex;
  gap: 2rem;
}

/* Left main content */
.main {
  flex: 3;
}

/* Sidebar */
.sidebar {
  flex: 1;
  background: #1e1e1ecc;
  border-radius: 15px;
  padding: 1rem;
  box-shadow: 0 0 20px #00000088;
}

h1 {
  text-align: center;
  margin-bottom: 1rem;
}

select {
  padding: 0.5rem;
  margin: 0.5rem;
  background: #1f1f1f;
  color: #e0e0e0;
  border: 1px solid #333;
  border-radius: 5px;
}

.controls {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}

.card {
  background: #1e1e1ecc;
  border-radius: 15px;
  padding: 1rem;
  margin: 1rem 0;
  box-shadow: 0 0 20px #00000088;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

canvas {
  width: 100%;
  height: 250px;
}

.summary-cards {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.summary-cards .card {
  flex: 1 1 200px;
  text-align: center;
  font-weight: bold;
}

.recommendation {
  text-align: center;
  margin-top: 1rem;
  font-size: 1.2rem;
  font-weight: bold;
  color: #f39c12;
}

.sidebar h2 {
  margin-top: 0;
  margin-bottom: 0.5rem;
  font-size: 1.2rem;
  text-align: center;
}

.sidebar ul {
  list-style: none;
  padding-left: 0;
}

.sidebar li {
  padding: 0.3rem 0;
  border-bottom: 1px solid #333;
}
.sidebar li:hover {
  background: #333;
  cursor: pointer;
}

footer {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.8rem;
  color: #888;
}
</style>
</head>
<body>
<div class="parallax-layer layer1"></div>
<div class="parallax-layer layer2"></div>
<div class="parallax-layer layer3"></div>

<div class="container">
  <div class="main">
    <h1>FPS Calculator</h1>
    <div class="controls">
      <select id="gameSelect">
        <option value="warzone">Warzone</option>
        <option value="valorant">Valorant</option>
        <option value="cs2">CS2</option>
        <option value="fortnite">Fortnite</option>
        <option value="apex">Apex Legends</option>
        <option value="blackops7">Black Ops 7</option>
      </select>
      <select id="cpuSelect"></select>
      <select id="gpuSelect"></select>
    </div>

    <div class="card">
      <canvas id="fpsChart"></canvas>
      <div class="summary-cards">
        <div class="card">1080p Avg: <span id="avg1080">-</span> FPS</div>
        <div class="card">1440p Avg: <span id="avg1440">-</span> FPS</div>
        <div class="card">4K Avg: <span id="avg4k">-</span> FPS</div>
      </div>
      <div class="recommendation" id="recommendation">Recommendation: -</div>
    </div>
  </div>

  <div class="sidebar">
    <h2>Top CPUs</h2>
    <ul id="topCPUs"></ul>
    <h2>Top GPUs</h2>
    <ul id="topGPUs"></ul>
  </div>
</div>

<footer>FPS data from TechSpot. Max realistic at competitive settings.</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const cpuSelect = document.getElementById('cpuSelect');
const gpuSelect = document.getElementById('gpuSelect');
const gameSelect = document.getElementById('gameSelect');
const avg1080 = document.getElementById('avg1080');
const avg1440 = document.getElementById('avg1440');
const avg4k = document.getElementById('avg4k');
const recommendation = document.getElementById('recommendation');
const topCPUs = document.getElementById('topCPUs');
const topGPUs = document.getElementById('topGPUs');
const parallaxLayers = document.querySelectorAll('.parallax-layer');

let chart;
const resolutions = ['1080p', '1440p', '4K'];
let gameData = {};

// Mouse parallax
document.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 40;
  const y = (e.clientY / window.innerHeight - 0.5) * 40;
  parallaxLayers.forEach((layer, i) => {
    const factor = (i+1)/3;
    layer.style.transform = `translate(${x*factor}px, ${y*factor}px) scale(${1 + factor*0.05})`;
  });
});

// Load JSONs
async function loadJSON(game) {
  const res = await fetch(`data/${game}.json`);
  gameData[game] = await res.json();
}

function populateDropdowns(game) {
  cpuSelect.innerHTML = '';
  gpuSelect.innerHTML = '';
  const cpus = Object.keys(gameData[game]['1080p'].CPUs).sort();
  const gpus = Object.keys(gameData[game]['1080p'].GPUs).sort();
  cpus.forEach(c => cpuSelect.add(new Option(c, c)));
  gpus.forEach(g => gpuSelect.add(new Option(g, g)));
}

// Get top 3 CPUs and GPUs by avg FPS
function updateTopComponents(game) {
  const cpus = Object.entries(gameData[game]['1080p'].CPUs).map(([name,val]) => {
    const avg = (gameData[game]['1080p'].CPUs[name] + gameData[game]['1440p'].CPUs[name] + gameData[game]['4K'].CPUs[name])/3;
    return {name, avg};
  }).sort((a,b) => b.avg - a.avg).slice(0,3);

  const gpus = Object.entries(gameData[game]['1080p'].GPUs).map(([name,val]) => {
    const avg = (gameData[game]['1080p'].GPUs[name] + gameData[game]['1440p'].GPUs[name] + gameData[game]['4K'].GPUs[name])/3;
    return {name, avg};
  }).sort((a,b) => b.avg - a.avg).slice(0,3);

  topCPUs.innerHTML = cpus.map(c => `<li>${c.name} (${Math.round(c.avg)} FPS)</li>`).join('');
  topGPUs.innerHTML = gpus.map(g => `<li>${g.name} (${Math.round(g.avg)} FPS)</li>`).join('');
}

function updateChart() {
  const game = gameSelect.value;
  const cpu = cpuSelect.value;
  const gpu = gpuSelect.value;

  const cpuValues = resolutions.map(r => gameData[game][r].CPUs[cpu]);
  const gpuValues = resolutions.map(r => gameData[game][r].GPUs[gpu]);
  const minValues = resolutions.map((v,i) => Math.min(cpuValues[i], gpuValues[i]));

  avg1080.textContent = Math.round(minValues[0]);
  avg1440.textContent = Math.round(minValues[1]);
  avg4k.textContent = Math.round(minValues[2]);

  // Recommendation
  const lastResIndex = 2;
  if(cpuValues[lastResIndex] < gpuValues[lastResIndex]) recommendation.textContent = 'Recommendation: CPU-limited';
  else if(cpuValues[lastResIndex] > gpuValues[lastResIndex]) recommendation.textContent = 'Recommendation: GPU-limited';
  else recommendation.textContent = 'Recommendation: Balanced';

  updateTopComponents(game);

  if(chart) chart.destroy();
  const ctx = document.getElementById('fpsChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: resolutions,
      datasets: [
        { label: 'CPU FPS', data: cpuValues, backgroundColor: '#3a3a3a', hoverBackgroundColor: '#555' },
        { label: 'GPU FPS', data: gpuValues, backgroundColor: '#555', hoverBackgroundColor: '#777' },
        { label: 'Min FPS', data: minValues, backgroundColor: '#888', hoverBackgroundColor: '#aaa' }
      ]
    },
    options: {
      responsive: true,
      animation: { duration: 1000, easing: 'easeOutQuart' },
      plugins: { tooltip: { enabled: true } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

async function init() {
  const games = ['warzone','valorant','cs2','fortnite','apex','blackops7'];
  for(const g of games) await loadJSON(g);
  populateDropdowns('warzone');
  updateChart();
}

gameSelect.addEventListener('change', () => {
  populateDropdowns(gameSelect.value);
  updateChart();
});
cpuSelect.addEventListener('change', updateChart);
gpuSelect.addEventListener('change', updateChart);

init();
</script>
</body>
</html>
