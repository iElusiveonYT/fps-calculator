<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Calculator</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ------------------- Global ------------------- */
html, body {
  margin: 0; padding: 0;
  font-family: 'Roboto Mono', monospace;
  background: #121212;
  color: #e0e0e0;
  overflow-x: hidden;
  height: 100%;
  cursor: crosshair;
}

/* ------------------- Parallax Lines Background ------------------- */
.parallax-line {
  position: fixed;
  width: 200%; height: 200%;
  top: -50%; left: -50%;
  background: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 40px
  );
  z-index: -1;
  animation: drift 60s linear infinite;
  pointer-events: none;
}

@keyframes drift {
  0% { transform: translate(0,0); }
  100% { transform: translate(50px,50px); }
}

/* ------------------- Layout ------------------- */
.container {
  display: flex;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
  gap: 2rem;
}

.main { flex: 3; }
.sidebar { flex: 1; background: #1e1e1ecc; border-radius: 20px; padding: 1rem; box-shadow: 0 10px 30px #000000aa; }

h1 { text-align: center; margin-bottom: 1rem; }

select {
  padding: 0.5rem; margin: 0.5rem;
  background: #1f1f1f; color: #e0e0e0;
  border: 1px solid #333; border-radius: 5px;
  transition: 0.3s;
}

select:focus { border-color: #4a90e2; outline: none; }

.controls { display: flex; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }

.card {
  background: #1f1f1fcc; border-radius: 20px;
  padding: 1.5rem; margin: 1rem 0;
  box-shadow: 0 10px 30px #000000aa;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover { transform: translateY(-8px); box-shadow: 0 15px 40px #000000dd; }

canvas { width: 100%; height: 250px; }

.summary-cards { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 1rem; }
.summary-cards .card { flex: 1 1 200px; text-align: center; font-weight: bold; }

.recommendation { text-align: center; margin-top: 1rem; font-size: 1.2rem; font-weight: bold; color: #f39c12; }

.sidebar h2 { margin-top: 0; margin-bottom: 0.5rem; font-size: 1.2rem; text-align: center; }
.sidebar ul { list-style: none; padding-left: 0; }
.sidebar li { padding: 0.3rem 0; border-bottom: 1px solid #333; transition: 0.2s; }
.sidebar li:hover { background: #2a2a2a; cursor: pointer; transform: translateX(5px); }

/* Footer */
footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #888; }
</style>
</head>
<body>

<!-- Parallax Lines -->
<div class="parallax-line"></div>

<div class="container">
  <div class="main">
    <h1>FPS Calculator</h1>
    <div class="controls">
      <select id="gameSelect">
        <option value="warzone">Warzone</option>
        <option value="valorant">Valorant</option>
        <option value="cs2">CS2</option>
        <option value="fortnite">Fortnite</option>
        <option value="apex">Apex Legends</option>
        <option value="blackops7">Black Ops 7</option>
      </select>
      <select id="cpuSelect"></select>
      <select id="gpuSelect"></select>
    </div>

    <div class="card">
      <canvas id="fpsChart"></canvas>
      <div class="summary-cards">
        <div class="card">1080p Avg: <span id="avg1080">-</span> FPS</div>
        <div class="card">1440p Avg: <span id="avg1440">-</span> FPS</div>
        <div class="card">4K Avg: <span id="avg4k">-</span> FPS</div>
      </div>
      <div class="recommendation" id="recommendation">Recommendation: -</div>
    </div>
  </div>

  <div class="sidebar">
    <h2>Top CPUs</h2>
    <ul id="topCPUs"></ul>
    <h2>Top GPUs</h2>
    <ul id="topGPUs"></ul>
  </div>
</div>

<footer>FPS data from TechSpot. Max realistic at competitive settings.</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const cpuSelect = document.getElementById('cpuSelect');
const gpuSelect = document.getElementById('gpuSelect');
const gameSelect = document.getElementById('gameSelect');
const avg1080 = document.getElementById('avg1080');
const avg1440 = document.getElementById('avg1440');
const avg4k = document.getElementById('avg4k');
const recommendation = document.getElementById('recommendation');
const topCPUs = document.getElementById('topCPUs');
const topGPUs = document.getElementById('topGPUs');

let chart;
const resolutions = ['1080p', '1440p', '4K'];
let gameData = {};

// Load JSON files (place them in /data/)
async function loadJSON(game) {
  const res = await fetch(`data/${game}.json`);
  gameData[game] = await res.json();
}

// Populate CPU/GPU dropdowns
function populateDropdowns(game) {
  cpuSelect.innerHTML = '';
  gpuSelect.innerHTML = '';
  const cpus = Object.keys(gameData[game]['1080p'].CPUs).sort();
  const gpus = Object.keys(gameData[game]['1080p'].GPUs).sort();
  cpus.forEach(c => cpuSelect.add(new Option(c,c)));
  gpus.forEach(g => gpuSelect.add(new Option(g,g)));
}

// Update sidebar top components
function updateTopComponents(game) {
  const cpus = Object.entries(gameData[game]['1080p'].CPUs)
    .map(([name,val]) => ({name, avg: (gameData[game]['1080p'].CPUs[name]+gameData[game]['1440p'].CPUs[name]+gameData[game]['4K'].CPUs[name])/3}))
    .sort((a,b)=>b.avg-a.avg).slice(0,3);
  const gpus = Object.entries(gameData[game]['1080p'].GPUs)
    .map(([name,val]) => ({name, avg: (gameData[game]['1080p'].GPUs[name]+gameData[game]['1440p'].GPUs[name]+gameData[game]['4K'].GPUs[name])/3}))
    .sort((a,b)=>b.avg-a.avg).slice(0,3);

  topCPUs.innerHTML = cpus.map(c=>`<li>${c.name} (${Math.round(c.avg)} FPS)</li>`).join('');
  topGPUs.innerHTML = gpus.map(g=>`<li>${g.name} (${Math.round(g.avg)} FPS)</li>`).join('');
}

// Update Chart & Summary
function updateChart() {
  const game = gameSelect.value;
  const cpu = cpuSelect.value;
  const gpu = gpuSelect.value;
  const cpuValues = resolutions.map(r => gameData[game][r].CPUs[cpu]);
  const gpuValues = resolutions.map(r => gameData[game][r].GPUs[gpu]);
  const minValues = resolutions.map((v,i)=>Math.min(cpuValues[i], gpuValues[i]));

  avg1080.textContent = Math.round(minValues[0]);
  avg1440.textContent = Math.round(minValues[1]);
  avg4k.textContent = Math.round(minValues[2]);

  // Recommendation
  const lastIndex = 2;
  if(cpuValues[lastIndex]<gpuValues[lastIndex]) recommendation.textContent="Recommendation: CPU-limited";
  else if(cpuValues[lastIndex]>gpuValues[lastIndex]) recommendation.textContent="Recommendation: GPU-limited";
  else recommendation.textContent="Recommendation: Balanced";

  updateTopComponents(game);

  if(chart) chart.destroy();
  const ctx=document.getElementById('fpsChart').getContext('2d');
  chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:resolutions,
      datasets:[
        {label:'CPU FPS', data:cpuValues, backgroundColor:'rgba(58,58,58,0.9)', borderRadius:10, hoverBackgroundColor:'rgba(100,100,100,0.9)'},
        {label:'GPU FPS', data:gpuValues, backgroundColor:'rgba(85,85,85,0.9)', borderRadius:10, hoverBackgroundColor:'rgba(120,120,120,0.9)'},
        {label:'Min FPS', data:minValues, backgroundColor:'rgba(136,136,136,0.9)', borderRadius:10, hoverBackgroundColor:'rgba(170,170,170,0.9)'}
      ]
    },
    options:{
      responsive:true,
      animation:{duration:1000,easing:'easeOutQuart'},
      plugins:{tooltip:{enabled:true}},
      scales:{y:{beginAtZero:true}}
    }
  });
}

// Initialize
async function init(){
  const games=['warzone','valorant','cs2','fortnite','apex','blackops7'];
  for(const g of games) await loadJSON(g);
  populateDropdowns('warzone');
  updateChart();
}

// Event listeners
gameSelect.addEventListener('change', ()=>{populateDropdowns(gameSelect.value);updateChart();});
cpuSelect.addEventListener('change', updateChart);
gpuSelect.addEventListener('change', updateChart);

init();
</script>
</body>
</html>
